services:
  sftp:
    image: atmoz/sftp
    command: testuser:testpass:::upload
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'SFTP service running'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SFTP_HOST=sftp
      - SFTP_PORT=22
      - SFTP_USER=testuser
      - SFTP_PASSWORD=testpass
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
    depends_on:
      sftp:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
